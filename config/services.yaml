parameters:
    locale: 'en'
    travel_photos_directory: '%kernel.project_dir%/public/uploads/travel_photos'

services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false

    App\:
        resource: '../src/*'
        exclude:
            - '../src/{Entity,Migrations,Tests}'
            - '../src/Infrastructure/Application/ElasticSearch'
            - '../src/Infrastructure/TravelBundle/Repository/ElasticSearch*.php'
            - '../src/Infrastructure/TravelBundle/DataTransformer/ElasticSearch*.php'
            - '../src/Infrastructure/Middleware/ElasticSearchMiddleware.php'
            - '../src/UI/Controller/Command/ElasticSearch*.php'
            - '../src/UI/Controller/Command/PopulateTravelsToElasticSearchCommand.php'
            - '../src/Application/UseCases/Travel/PopulateIndexer.php'

    App\UI\Controller\:
        resource: '../src/UI/Controller'
        exclude: '../src/UI/Controller/Command'
        tags: ['controller.service_arguments']

    # Query Bus — receives the query.bus
    queryBus:
        class: App\Infrastructure\Application\QueryBus\QueryBus
        arguments: ['@query.bus']

    App\Infrastructure\Application\QueryBus\QueryBus:
        arguments: ['@query.bus']

    # WebSocket
    App\Infrastructure\WebSocket\WebSocketNotifier:
        arguments:
            $wsServerUrl: '%env(string:WEBSOCKET_SERVER_URL)%'
            $logger: '@logger'

    # Repository Travel
    App\Infrastructure\TravelBundle\Repository\DoctrineTravelRepository:
        arguments: ['@doctrine']

    doctrine.travel.repository: '@App\Infrastructure\TravelBundle\Repository\DoctrineTravelRepository'
    doctrine.travel.read_model.repository: '@App\Infrastructure\TravelBundle\Repository\DoctrineTravelReadModelRepository'

    # Repository User
    App\Infrastructure\UserBundle\Repository\DoctrineUserRepository:
        arguments: ['@doctrine']

    doctrine.user.repository: '@App\Infrastructure\UserBundle\Repository\DoctrineUserRepository'

    # Repository Location
    App\Infrastructure\LocationBundle\Repository\DoctrineLocationRepository:
        arguments: ['@doctrine']

    doctrine.location.repository: '@App\Infrastructure\LocationBundle\Repository\DoctrineLocationRepository'

    # Repository Mark
    App\Infrastructure\MarkBundle\Repository\DoctrineMarkRepository:
        arguments: ['@doctrine']

    doctrine.mark.repository: '@App\Infrastructure\MarkBundle\Repository\DoctrineMarkRepository'

    # Event store repository
    App\Infrastructure\EventBundle\Repository\DoctrineEventStore:
        arguments: ['@doctrine', '@jms_serializer']

    App\Infrastructure\EventBundle\Repository\DummyEventStore:
        arguments: ['@doctrine']

    App\Domain\Event\Repository\EventStore:
        alias: App\Infrastructure\EventBundle\Repository\DummyEventStore

    doctrine.travel_event.repository: '@App\Infrastructure\EventBundle\Repository\DummyEventStore'

    # Query handlers — registrados explícitamente en query.bus
    App\Application\UseCases\Travel\GetAllMyTravelsService:
        tags:
            - { name: messenger.message_handler, bus: query.bus }

    App\Application\UseCases\Travel\ShowTravelService:
        arguments: ['@doctrine.travel.repository', '@doctrine.orm.entity_manager']
        tags:
            - { name: messenger.message_handler, bus: query.bus }

    App\Application\UseCases\Travel\GetBestTravelsOrderedByService:
        arguments: ['@doctrine.travel.read_model.repository']
        tags:
            - { name: messenger.message_handler, bus: query.bus }

    App\Application\UseCases\Location\GetLocationsByTravelService:
        tags:
            - { name: messenger.message_handler, bus: query.bus }

    # Command handlers — registrados explícitamente en command.bus
    App\Application\UseCases\Travel\AddTravelService:
        arguments: ['@doctrine.travel.repository', '@doctrine.user.repository']
        tags:
            - { name: messenger.message_handler, bus: command.bus }

    App\Application\UseCases\Travel\ShareTravelService:
        arguments: ['@doctrine.travel.repository', '@doctrine.user.repository']
        tags:
            - { name: messenger.message_handler, bus: command.bus }

    App\Application\UseCases\Travel\UnshareTravelService:
        arguments: ['@doctrine.travel.repository', '@doctrine.user.repository']
        tags:
            - { name: messenger.message_handler, bus: command.bus }

    App\Application\UseCases\Travel\PublishTravelService:
        arguments: ['@doctrine.travel.repository', '@doctrine.user.repository']
        tags:
            - { name: messenger.message_handler, bus: command.bus }

    App\Application\UseCases\Travel\UnpublishTravelService:
        arguments: ['@doctrine.travel.repository', '@doctrine.user.repository']
        tags:
            - { name: messenger.message_handler, bus: command.bus }

    App\Application\UseCases\Travel\UpdateTravelService:
        arguments: ['@doctrine.travel.repository']
        tags:
            - { name: messenger.message_handler, bus: command.bus }

    App\Application\UseCases\Location\AddLocationService:
        arguments: ['@doctrine.travel.repository', '@doctrine.user.repository', '@doctrine.mark.repository', '@doctrine.location.repository', '@App\Infrastructure\TypeLocationBundle\Repository\DoctrineTypeLocation', '@App\Infrastructure\WebSocket\WebSocketNotifier']
        tags:
            - { name: messenger.message_handler, bus: command.bus }

    # Twig string-extra extension (filtro u.truncate, etc.)
    Twig\Extra\String\StringExtension:
        tags:
            - { name: twig.extension }

    # Domain Events Middleware
    App\Infrastructure\Middleware\DomainEventsMiddleware:
        arguments:
            - '@App\Domain\Event\Repository\EventStore'
            - '@event_dispatcher'
            - '@doctrine.travel.repository'
