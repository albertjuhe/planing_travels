monolog:
    handlers:
        main:
            type: fingers_crossed
            action_level: error
            handler: nested
            excluded_404s:
                # regex: exclude all 404 errors from the logs
                - ^/
        nested:
            type: stream
            path: "%kernel.logs_dir%/%kernel.environment%.log"
            level: debug
            # Exclude security channels that might log sensitive data
            channels: ["!security", "!authentication"]
        console:
            type: console
            process_psr_3_messages: false
            channels: ["!event", "!doctrine", "!security"]
        deprecation:
            type: stream
            path: "%kernel.logs_dir%/%kernel.environment%.deprecations.log"
        deprecation_filter:
            type: filter
            handler: deprecation
            max_level: info
            channels: ["php"]

    # Security note: Ensure no passwords, tokens, or API keys are logged
    # Avoid using $logger->info('User logged in: ' . $password) or similar
