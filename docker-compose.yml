services:
  app:
    platform: linux/amd64
    build:
      context: ${PWD}/Docker
      dockerfile: Dockerfile
    ports:
      - "8000:80"
    volumes:
      - ${PWD}:/var/www/html
      - ./Docker/php/conf.d/error_reporting.ini:/usr/local/etc/php/conf.d/error_reporting.ini
    environment:
      - MYSQL_HOST
      - MYSQL_USER
      - MYSQL_PASSWORD
      - DISPLAY_ERRORS
      - WAIT_COMMAND
      - WAIT_START_CMD
      - WAIT_SLEEP
      - WAIT_LOOPS
      - PHP_EXTENSION_XDEBUG=0
      - ENABLE_XDEBUG=0
      - WEBSOCKET_SERVER_URL=http://websocket:5555
    entrypoint: ["/bin/sh", "-c", "git config --global --add safe.directory /var/www/html && exec apache2-foreground"]
    depends_on:
      - mysql
      #- elasticsearch
      - websocket
    #command: sh /var/www/html/Docker/wait_to_start.sh

  websocket:
    build:
      context: ${PWD}/PlanningTravelsSocketio
      dockerfile: Dockerfile
    ports:
      - "5555:5555"

  mysql:
    image: mysql:5.7
    platform: linux/amd64
    environment:
      - MYSQL_ROOT_PASSWORD=root
    volumes:
      - ${PWD}/Docker/migrations:/docker-entrypoint-initdb.d

  adminer:
    image: adminer
    ports:
      - 8080:8080
    depends_on:
      - mysql

