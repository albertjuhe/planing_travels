name: Test php planing travels

on: [push, pull_request]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Cleanup
        run: |
          sudo chown -R $USER:$USER $GITHUB_WORKSPACE

      - name: Checkout repository
        uses: actions/checkout@5a4ac9002d0be2fb38bd78e4b4dbde5606d7042f

      - name: Fix Git Repository Ownership
        run: |
          git config --global --add safe.directory /var/www/html

      - name: Install Docker Compose
        uses: ./.github/docker-compose

      - name: Make up
        run: |
            make up
            # Wait for the app container to be ready
            sleep 10
            docker-compose exec -T app sh -c 'until composer --version > /dev/null 2>&1; do sleep 2; done'

      - name: Composer install
        run: |
           make exec CMD="composer install --no-plugins --no-audit"

      - name: Composer Cache
        run: |
          make exec CMD="composer config cache-files-dir"

      - name: Run Unit tests
        run: |
          make unit-test

      - name: CS Fixer
        run: |
          make cs-fix
          make cs-fix-tests

      - if: always()
        name: Stop containers
        run: |
          make down
